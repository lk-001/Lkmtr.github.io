<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>铁道会社管理 - LK-Minecraft-mtr</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .input-field {
            transition: all 0.3s ease;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.9);
        }
        
        .input-field:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }
        
        .company-item {
            transition: all 0.3s ease;
            border-left: 4px solid #667eea;
        }
        
        .company-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .route-item {
            transition: all 0.3s ease;
            border-left: 3px solid #ff6b6b;
        }
        
        .route-item:hover {
            transform: translateX(3px);
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .slide-up {
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideUp {
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
        
        .success-pulse {
            animation: successPulse 0.6s ease-out;
        }
        
        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .route-form-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .route-form-container.expanded {
            max-height: 500px;
        }
        
        .route-list-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        
        .route-list-container.expanded {
            max-height: 300px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="max-w-6xl w-full mx-auto">
        <!-- 标题区域 -->
        <div class="text-center mb-8 fade-in">
            <h1 class="text-5xl font-bold text-white mb-3 drop-shadow-lg">
                <i class="fa fa-train mr-3"></i>铁道会社管理
            </h1>
            <p class="text-xl text-white/90">创建和管理您的Minecraft铁路公司及线路</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 左侧：添加公司表单 -->
            <div class="card rounded-2xl p-8 slide-up">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
                    <i class="fa fa-plus-circle text-purple-600 mr-3"></i>
                    新会社登録
                </h2>
                
                <!-- 消息显示 -->
                <div id="message" class="hidden mb-6 p-4 rounded-xl text-center font-medium"></div>
                
                <!-- 添加表单 -->
                <form id="companyForm" class="space-y-6">
                    <!-- 会社名 -->
                    <div>
                        <label for="companyName" class="block text-sm font-semibold text-gray-700 mb-2">
                            会社名 <span class="text-red-500">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="companyName" 
                            required
                            placeholder="例：東京急行電鉄" 
                            class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none"
                        >
                    </div>

                    <!-- 会社コード -->
                    <div>
                        <label for="companyCode" class="block text-sm font-semibold text-gray-700 mb-2">
                            会社コード <span class="text-red-500">*</span>
                        </label>
                        <input 
                            type="text" 
                            id="companyCode" 
                            required
                            placeholder="例：Tokyu" 
                            class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none"
                        >
                    </div>

                    <!-- 線色 -->
                    <div>
                        <label for="companyColor" class="block text-sm font-semibold text-gray-700 mb-2">
                            線色
                        </label>
                        <input 
                            type="color" 
                            id="companyColor" 
                            value="#ff6b6b"
                            class="input-field w-full h-14 rounded-xl cursor-pointer"
                        >
                    </div>

                    <!-- 会社説明 -->
                    <div>
                        <label for="companyDescription" class="block text-sm font-semibold text-gray-700 mb-2">
                            会社説明
                        </label>
                        <textarea 
                            id="companyDescription" 
                            rows="3"
                            placeholder="会社の概要や特徴を入力してください..." 
                            class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none resize-none"
                        ></textarea>
                    </div>

                    <!-- 操作ボタン -->
                    <div class="pt-4">
                        <button 
                            type="submit" 
                            id="addButton"
                            class="btn-primary w-full py-4 rounded-xl font-semibold text-lg flex items-center justify-center gap-2"
                        >
                            <i class="fa fa-plus-circle"></i>
                            会社を追加する
                        </button>
                    </div>
                </form>
            </div>

            <!-- 右侧：会社リスト -->
            <div class="card rounded-2xl p-8 slide-up" style="animation-delay: 0.1s;">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                        <i class="fa fa-building text-purple-600 mr-3"></i>
                        登録済み会社
                    </h2>
                    <span id="companyCount" class="text-sm bg-gray-100 text-gray-700 px-3 py-1 rounded-full">
                        0 社
                    </span>
                </div>

                <!-- 検索 -->
                <div class="mb-6">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="会社名やコードで検索..." 
                        class="input-field w-full px-5 py-3 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none"
                    >
                </div>

                <!-- 会社リスト -->
                <div id="companyList" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    <!-- 空の状態 -->
                    <div id="emptyState" class="text-center py-12">
                        <div class="bg-blue-50 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4">
                            <i class="fa fa-train text-blue-500 text-4xl"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-700 mb-2">まだ会社がありません</h3>
                        <p class="text-gray-500">左側のフォームから最初の会社を登録しましょう</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- フッター -->
        <footer class="text-center text-white/80 text-sm mt-8">
            <p>© 2026 LK-Minecraft-mtr | このシステムはフィクションです</p>
        </footer>
    </div>

    <!-- 编辑模态框 -->
    <div id="editModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 fade-in">
        <div class="card rounded-2xl p-8 max-w-md w-full mx-4 slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800 flex items-center">
                    <i class="fa fa-pencil text-blue-600 mr-3"></i>
                    会社情報編集
                </h2>
                <button onclick="closeEditModal()" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times text-xl"></i>
                </button>
            </div>
            
            <!-- 编辑表单 -->
            <form id="editForm" class="space-y-6">
                <input type="hidden" id="editCompanyId">
                
                <!-- 会社名 -->
                <div>
                    <label for="editCompanyName" class="block text-sm font-semibold text-gray-700 mb-2">
                        会社名 <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="editCompanyName" 
                        required
                        placeholder="例：東京急行電鉄" 
                        class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none"
                    >
                </div>

                <!-- 会社コード -->
                <div>
                    <label for="editCompanyCode" class="block text-sm font-semibold text-gray-700 mb-2">
                        会社コード <span class="text-red-500">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="editCompanyCode" 
                        required
                        placeholder="例：Tokyu" 
                        class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none"
                    >
                </div>

                <!-- 線色 -->
                <div>
                    <label for="editCompanyColor" class="block text-sm font-semibold text-gray-700 mb-2">
                        線色
                    </label>
                    <input 
                        type="color" 
                        id="editCompanyColor" 
                        value="#ff6b6b"
                        class="input-field w-full h-14 rounded-xl cursor-pointer"
                    >
                </div>

                <!-- 会社説明 -->
                <div>
                    <label for="editCompanyDescription" class="block text-sm font-semibold text-gray-700 mb-2">
                        会社説明
                    </label>
                    <textarea 
                        id="editCompanyDescription" 
                        rows="4"
                        placeholder="会社の概要や特徴を入力してください..." 
                        class="input-field w-full px-5 py-4 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none resize-none"
                    ></textarea>
                </div>

                <!-- 操作ボタン -->
                <div class="pt-4 flex gap-3">
                    <button 
                        type="button" 
                        onclick="closeEditModal()"
                        class="w-1/2 py-4 rounded-xl font-semibold text-lg border-2 border-gray-300 text-gray-700 hover:bg-gray-50"
                    >
                        キャンセル
                    </button>
                    <button 
                        type="submit" 
                        id="saveEditButton"
                        class="btn-primary w-1/2 py-4 rounded-xl font-semibold text-lg"
                    >
                        保存する
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================
        // グローバル変数
        // ============================
        let railwayCompanies = [];
        let filteredCompanies = [];
        let railwayRoutes = [];
        const COMPANIES_STORAGE_KEY = 'mtr_railway_companies';
        const ROUTES_STORAGE_KEY = 'mtr_railway_routes';

        // ============================
        // ユーティリティ関数
        // ============================
        
        /**
         * メッセージを表示する
         */
        function showMessage(text, type = 'success') {
            const messageElement = document.getElementById('message');
            const typeClasses = {
                success: 'bg-gradient-to-r from-green-500 to-emerald-600 text-white',
                error: 'bg-gradient-to-r from-red-500 to-rose-600 text-white',
                info: 'bg-gradient-to-r from-blue-500 to-indigo-600 text-white'
            };
            
            messageElement.textContent = text;
            messageElement.className = `mb-6 p-4 rounded-xl text-center font-medium ${typeClasses[type]} fade-in`;
            messageElement.classList.remove('hidden');
            
            setTimeout(() => {
                messageElement.classList.add('hidden');
            }, 3000);
        }

        /**
         * ユニークIDを生成する
         */
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        /**
         * 日付をフォーマットする
         */
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ja-JP', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // ============================
        // データ管理 - 会社
        // ============================
        
        /**
         * 会社データをロードする
         */
        function loadCompaniesData() {
            try {
                const storedData = localStorage.getItem(COMPANIES_STORAGE_KEY);
                if (storedData) {
                    railwayCompanies = JSON.parse(storedData);
                    filteredCompanies = [...railwayCompanies];
                    console.log('会社データをロードしました:', railwayCompanies.length, '社の会社');
                }
            } catch (error) {
                console.error('会社データのロードに失敗しました:', error);
                railwayCompanies = [];
                filteredCompanies = [];
            }
        }

        /**
         * 会社データを保存する
         */
        function saveCompaniesData() {
            try {
                localStorage.setItem(COMPANIES_STORAGE_KEY, JSON.stringify(railwayCompanies));
                console.log('会社データを保存しました:', railwayCompanies.length, '社の会社');
                return true;
            } catch (error) {
                console.error('会社データの保存に失敗しました:', error);
                return false;
            }
        }

        /**
         * 新しい会社を追加する
         */
        function addRailwayCompany(companyData) {
            try {
                const newCompany = {
                    id: generateId(),
                    name: companyData.name.trim(),
                    code: companyData.code.trim(),
                    color: companyData.color || '#ff6b6b',
                    description: companyData.description.trim(),
                    createdAt: new Date().toISOString()
                };
                
                railwayCompanies.unshift(newCompany);
                filteredCompanies = [...railwayCompanies];
                
                console.log('新しい会社を追加しました:', newCompany);
                
                if (saveCompaniesData()) {
                    updateCompanyCount();
                    return newCompany;
                }
                return null;
            } catch (error) {
                console.error('会社の追加に失敗しました:', error);
                return null;
            }
        }

        /**
         * 会社を更新する
         */
        function updateRailwayCompany(id, companyData) {
            try {
                const index = railwayCompanies.findIndex(company => company.id === id);
                if (index === -1) return false;
                
                railwayCompanies[index] = {
                    ...railwayCompanies[index],
                    name: companyData.name.trim(),
                    code: companyData.code.trim(),
                    color: companyData.color || '#ff6b6b',
                    description: companyData.description.trim()
                };
                
                // 更新筛选后的列表
                const filteredIndex = filteredCompanies.findIndex(company => company.id === id);
                if (filteredIndex !== -1) {
                    filteredCompanies[filteredIndex] = railwayCompanies[index];
                }
                
                const success = saveCompaniesData();
                return success;
            } catch (error) {
                console.error('会社の更新に失敗しました:', error);
                return false;
            }
        }

        /**
         * 会社を削除する
         */
        function deleteRailwayCompany(id) {
            try {
                const index = railwayCompanies.findIndex(company => company.id === id);
                if (index === -1) return false;
                
                railwayCompanies.splice(index, 1);
                filteredCompanies = railwayCompanies.filter(company => company.id !== id);
                
                // 删除关联的线路
                railwayRoutes = railwayRoutes.filter(route => route.companyId !== id);
                saveRoutesData();
                
                const success = saveCompaniesData();
                if (success) {
                    updateCompanyCount();
                }
                return success;
            } catch (error) {
                console.error('会社の削除に失敗しました:', error);
                return false;
            }
        }

        // ============================
        // データ管理 - 线路
        // ============================
        
        /**
         * 线路データをロードする
         */
        function loadRoutesData() {
            try {
                const storedData = localStorage.getItem(ROUTES_STORAGE_KEY);
                if (storedData) {
                    railwayRoutes = JSON.parse(storedData);
                    console.log('路線データをロードしました:', railwayRoutes.length, '路線');
                }
            } catch (error) {
                console.error('路線データのロードに失敗しました:', error);
                railwayRoutes = [];
            }
        }

        /**
         * 线路データを保存する
         */
        function saveRoutesData() {
            try {
                localStorage.setItem(ROUTES_STORAGE_KEY, JSON.stringify(railwayRoutes));
                console.log('路線データを保存しました:', railwayRoutes.length, '路線');
                return true;
            } catch (error) {
                console.error('路線データの保存に失敗しました:', error);
                return false;
            }
        }

        /**
         * 新しい线路を追加する
         */
        function addRailwayRoute(routeData) {
            try {
                const newRoute = {
                    id: generateId(),
                    companyId: routeData.companyId,
                    name: routeData.name.trim(),
                    code: routeData.code.trim(),
                    stationCount: parseInt(routeData.stationCount) || 1,
                    createdAt: new Date().toISOString()
                };
                
                railwayRoutes.unshift(newRoute);
                
                console.log('新しい路線を追加しました:', newRoute);
                
                if (saveRoutesData()) {
                    return newRoute;
                }
                return null;
            } catch (error) {
                console.error('路線の追加に失敗しました:', error);
                return null;
            }
        }

        /**
         * 线路を削除する
         */
        function deleteRailwayRoute(id) {
            try {
                const index = railwayRoutes.findIndex(route => route.id === id);
                if (index === -1) return false;
                
                railwayRoutes.splice(index, 1);
                
                const success = saveRoutesData();
                return success;
            } catch (error) {
                console.error('路線の削除に失敗しました:', error);
                return false;
            }
        }

        /**
         * 获取公司的线路
         */
        function getCompanyRoutes(companyId) {
            return railwayRoutes.filter(route => route.companyId === companyId);
        }

        // ============================
        // 更新関数
        // ============================
        
        /**
         * 会社数を更新する
         */
        function updateCompanyCount() {
            document.getElementById('companyCount').textContent = `${railwayCompanies.length} 社`;
        }

        // ============================
        // レンダリング関数
        // ============================
        
        /**
         * 会社リストをレンダリングする
         */
        function renderCompanyList() {
            const companyList = document.getElementById('companyList');
            const emptyState = document.getElementById('emptyState');
            
            // 既存のアイテムをクリアする
            const items = companyList.querySelectorAll('.company-item-container');
            items.forEach(item => item.remove());
            
            // 空の状態を表示/非表示にする
            if (filteredCompanies.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            } else {
                emptyState.classList.add('hidden');
            }
            
            // 会社アイテムを作成する
            filteredCompanies.forEach((company, index) => {
                const item = createCompanyItemWithRoutes(company, index);
                companyList.appendChild(item);
            });
        }

        /**
         * 会社アイテムを作成する（包含线路管理）
         */
        function createCompanyItemWithRoutes(company, index) {
            const container = document.createElement('div');
            container.className = 'company-item-container fade-in';
            container.style.animationDelay = `${index * 0.1}s`;
            
            // 获取该公司的线路
            const companyRoutes = getCompanyRoutes(company.id);
            
            container.innerHTML = `
                <div class="company-item bg-white rounded-lg p-4 shadow mb-2">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-2 mb-1">
                                <h3 class="font-bold text-gray-800">${company.name}</h3>
                                <span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs font-medium">${company.code}</span>
                            </div>
                            ${company.description ? `<p class="text-gray-600 text-sm mb-2">${company.description}</p>` : ''}
                            <div class="flex items-center justify-between text-xs text-gray-500 mb-3">
                                <span>登録日: ${formatDate(company.createdAt)}</span>
                                <div class="flex items-center gap-2">
                                    <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded-full">
                                        <i class="fa fa-route mr-1"></i>${companyRoutes.length} 路線
                                    </span>
                                    <div class="flex gap-1">
                                        <button onclick="toggleRouteForm('${company.id}')" 
                                                class="text-green-600 hover:text-green-800 p-1 rounded hover:bg-green-50"
                                                title="路線を追加">
                                            <i class="fa fa-plus"></i>
                                        </button>
                                        <button onclick="toggleRouteList('${company.id}')" 
                                                class="text-blue-600 hover:text-blue-800 p-1 rounded hover:bg-blue-50"
                                                title="路線を表示">
                                            <i class="fa fa-list"></i>
                                        </button>
                                        <button onclick="editCompany('${company.id}')" 
                                                class="text-purple-600 hover:text-purple-800 p-1 rounded hover:bg-purple-50"
                                                title="編集">
                                            <i class="fa fa-pencil"></i>
                                        </button>
                                        <button onclick="deleteCompany('${company.id}')" 
                                                class="text-red-600 hover:text-red-800 p-1 rounded hover:bg-red-50"
                                                title="削除">
                                            <i class="fa fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 线路表单 -->
                <div id="routeForm_${company.id}" class="route-form-container bg-white rounded-lg p-4 shadow mb-2">
                    <h4 class="font-semibold text-gray-800 mb-3 flex items-center">
                        <i class="fa fa-plus-circle text-green-600 mr-2"></i>
                        路線を追加
                    </h4>
                    <form id="routeForm_${company.id}_form" class="space-y-4">
                        <input type="hidden" name="companyId" value="${company.id}">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">路線名 *</label>
                                <input type="text" name="routeName" required 
                                       placeholder="例：東横線" 
                                       class="input-field w-full px-4 py-2 rounded-lg text-gray-700 placeholder-gray-400 focus:outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">路線コード *</label>
                                <input type="text" name="routeCode" required 
                                       placeholder="例：TYO" 
                                       class="input-field w-full px-4 py-2 rounded-lg text-gray-700 placeholder-gray-400 focus:outline-none text-sm">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">駅数</label>
                            <input type="number" name="stationCount" min="1" value="1"
                                   class="input-field w-full px-4 py-2 rounded-lg text-gray-700 focus:outline-none text-sm">
                        </div>
                        <div class="flex gap-2">
                            <button type="submit" 
                                    class="btn-primary px-4 py-2 rounded-lg font-semibold text-sm flex items-center justify-center gap-1">
                                <i class="fa fa-plus"></i>
                                追加
                            </button>
                            <button type="button" onclick="toggleRouteForm('${company.id}')"
                                    class="border-2 border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-semibold text-sm hover:bg-gray-50">
                                キャンセル
                            </button>
                        </div>
                    </form>
                </div>
                
                <!-- 线路列表 -->
                <div id="routeList_${company.id}" class="route-list-container bg-white rounded-lg p-4 shadow">
                    <h4 class="font-semibold text-gray-800 mb-3 flex items-center">
                        <i class="fa fa-list text-blue-600 mr-2"></i>
                        路線一覧 (${companyRoutes.length})
                    </h4>
                    <div id="routeList_${company.id}_content" class="space-y-2">
                        ${companyRoutes.length === 0 ? `
                            <div class="text-center py-4">
                                <p class="text-gray-500 text-sm">まだ路線がありません</p>
                            </div>
                        ` : companyRoutes.map((route, routeIndex) => `
                            <div class="route-item bg-white rounded-lg p-3 shadow" style="border-left-color: ${company.color}">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <div class="flex items-center gap-2 mb-1">
                                            <h5 class="font-bold text-gray-800 text-sm">${route.name}</h5>
                                            <span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs font-medium">${route.code}</span>
                                        </div>
                                        <div class="flex items-center gap-4 text-xs text-gray-500">
                                            <span>駅数: ${route.stationCount}</span>
                                            <span>登録日: ${formatDate(route.createdAt)}</span>
                                        </div>
                                    </div>
                                    <button onclick="deleteRoute('${route.id}')" 
                                            class="text-red-600 hover:text-red-800 p-1 rounded hover:bg-red-50"
                                            title="削除">
                                        <i class="fa fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            // 绑定线路表单提交事件
            setTimeout(() => {
                const form = container.querySelector(`#routeForm_${company.id}_form`);
                if (form) {
                    form.addEventListener('submit', handleRouteFormSubmit);
                }
            }, 100);
            
            return container;
        }

        /**
         * 更新特定公司的线路列表
         */
        function updateCompanyRouteList(companyId) {
            const company = railwayCompanies.find(c => c.id === companyId);
            if (!company) return;
            
            const companyRoutes = getCompanyRoutes(companyId);
            const contentDiv = document.getElementById(`routeList_${companyId}_content`);
            const header = document.querySelector(`#routeList_${companyId} h4`);
            
            if (header) {
                header.innerHTML = `<i class="fa fa-list text-blue-600 mr-2"></i>路線一覧 (${companyRoutes.length})`;
            }
            
            if (contentDiv) {
                if (companyRoutes.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="text-center py-4">
                            <p class="text-gray-500 text-sm">まだ路線がありません</p>
                        </div>
                    `;
                } else {
                    contentDiv.innerHTML = companyRoutes.map((route, routeIndex) => `
                        <div class="route-item bg-white rounded-lg p-3 shadow fade-in" style="border-left-color: ${company.color}; animation-delay: ${routeIndex * 0.1}s">
                            <div class="flex justify-between items-start">
                                <div>
                                    <div class="flex items-center gap-2 mb-1">
                                        <h5 class="font-bold text-gray-800 text-sm">${route.name}</h5>
                                        <span class="bg-gray-100 text-gray-700 px-2 py-0.5 rounded text-xs font-medium">${route.code}</span>
                                    </div>
                                    <div class="flex items-center gap-4 text-xs text-gray-500">
                                        <span>駅数: ${route.stationCount}</span>
                                        <span>登録日: ${formatDate(route.createdAt)}</span>
                                    </div>
                                </div>
                                <button onclick="deleteRoute('${route.id}')" 
                                        class="text-red-600 hover:text-red-800 p-1 rounded hover:bg-red-50"
                                        title="削除">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }

        /**
         * 会社を検索する
         */
        function searchCompanies() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            
            if (searchTerm === '') {
                filteredCompanies = [...railwayCompanies];
            } else {
                filteredCompanies = railwayCompanies.filter(company => 
                    company.name.toLowerCase().includes(searchTerm) ||
                    company.code.toLowerCase().includes(searchTerm) ||
                    (company.description && company.description.toLowerCase().includes(searchTerm))
                );
            }
            
            renderCompanyList();
        }

        // ============================
        // イベントハンドラ
        // ============================
        
        /**
         * 会社フォームの送信を処理する
         */
        function handleCompanyFormSubmit(e) {
            e.preventDefault();
            
            const name = document.getElementById('companyName').value.trim();
            const code = document.getElementById('companyCode').value.trim();
            const color = document.getElementById('companyColor').value;
            const description = document.getElementById('companyDescription').value.trim();
            
            // フォームの検証
            if (!name) {
                showMessage('会社名を入力してください', 'error');
                return;
            }
            
            if (!code) {
                showMessage('会社コードを入力してください', 'error');
                return;
            }
            
            // 重複チェック
            const isDuplicate = railwayCompanies.some(company => 
                company.name === name || company.code === code
            );
            
            if (isDuplicate) {
                showMessage('同じ会社名またはコードが既に存在します', 'error');
                return;
            }
            
            const companyData = { name, code, color, description };
            const newCompany = addRailwayCompany(companyData);
            
            if (newCompany) {
                showMessage('🎉 会社の登録が完了しました！', 'success');
                
                // フォームをリセットする
                document.getElementById('companyForm').reset();
                document.getElementById('companyColor').value = '#ff6b6b';
                
                // 成功アニメーション
                const addButton = document.getElementById('addButton');
                addButton.classList.add('success-pulse');
                setTimeout(() => addButton.classList.remove('success-pulse'), 600);
                
                // リストを再レンダリングする
                renderCompanyList();
            } else {
                showMessage('会社の登録に失敗しました', 'error');
            }
        }

        /**
         * 线路フォームの送信を処理する
         */
        function handleRouteFormSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const companyId = formData.get('companyId');
            const name = formData.get('routeName').trim();
            const code = formData.get('routeCode').trim();
            const stationCount = formData.get('stationCount');
            
            // 验证
            if (!companyId) {
                showMessage('会社情報が正しくありません', 'error');
                return;
            }
            
            if (!name) {
                showMessage('路線名を入力してください', 'error');
                return;
            }
            
            if (!code) {
                showMessage('路線コードを入力してください', 'error');
                return;
            }
            
            // 检查重复
            const isDuplicate = railwayRoutes.some(route => 
                route.companyId === companyId && (route.name === name || route.code === code)
            );
            
            if (isDuplicate) {
                showMessage('同じ路線名またはコードが既に存在します', 'error');
                return;
            }
            
            const routeData = { companyId, name, code, stationCount };
            const newRoute = addRailwayRoute(routeData);
            
            if (newRoute) {
                showMessage('🎉 路線の追加が完了しました！', 'success');
                
                // 重置表单
                e.target.reset();
                e.target.querySelector('input[name="stationCount"]').value = '1';
                
                // 隐藏表单
                toggleRouteForm(companyId);
                
                // 显示线路列表
                const listContainer = document.getElementById(`routeList_${companyId}`);
                if (listContainer && !listContainer.classList.contains('expanded')) {
                    toggleRouteList(companyId);
                }
                
                // 更新线路列表
                updateCompanyRouteList(companyId);
                
                // 更新公司列表（因为线路数变了）
                renderCompanyList();
            } else {
                showMessage('路線の追加に失敗しました', 'error');
            }
        }

        /**
         * 会社の削除を処理する
         */
        function deleteCompany(id) {
            const company = railwayCompanies.find(c => c.id === id);
            if (!company) return;
            
            // 检查是否有关联的线路
            const companyRoutes = getCompanyRoutes(id);
            const confirmMessage = companyRoutes.length > 0 
                ? `本当に「${company.name}」を削除しますか？\nこの会社には ${companyRoutes.length} 本の路線が存在し、一緒に削除されます。`
                : `本当に「${company.name}」を削除しますか？`;
            
            if (confirm(confirmMessage)) {
                if (deleteRailwayCompany(id)) {
                    showMessage('会社を削除しました', 'success');
                    renderCompanyList();
                } else {
                    showMessage('削除に失敗しました', 'error');
                }
            }
        }

        /**
         * 线路の削除を処理する
         */
        function deleteRoute(id) {
            const route = railwayRoutes.find(r => r.id === id);
            if (!route) return;
            
            const company = railwayCompanies.find(c => c.id === route.companyId);
            const companyName = company ? company.name : '不明';
            
            if (confirm(`本当に「${companyName}」の「${route.name}」路線を削除しますか？`)) {
                if (deleteRailwayRoute(id)) {
                    showMessage('路線を削除しました', 'success');
                    
                    // 更新线路列表
                    updateCompanyRouteList(route.companyId);
                    
                    // 更新公司列表
                    renderCompanyList();
                } else {
                    showMessage('削除に失敗しました', 'error');
                }
            }
        }

        /**
         * 会社の編集を処理する
         */
        function editCompany(id) {
            const company = railwayCompanies.find(c => c.id === id);
            if (!company) return;
            
            // 填充编辑表单
            document.getElementById('editCompanyId').value = company.id;
            document.getElementById('editCompanyName').value = company.name;
            document.getElementById('editCompanyCode').value = company.code;
            document.getElementById('editCompanyColor').value = company.color;
            document.getElementById('editCompanyDescription').value = company.description;
            
            // 显示模态框
            document.getElementById('editModal').classList.remove('hidden');
            document.getElementById('editModal').classList.add('flex');
        }

        /**
         * 关闭编辑模态框
         */
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            document.getElementById('editModal').classList.remove('flex');
            document.getElementById('editForm').reset();
        }

        /**
         * 保存编辑
         */
        function handleEditSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('editCompanyId').value;
            const name = document.getElementById('editCompanyName').value.trim();
            const code = document.getElementById('editCompanyCode').value.trim();
            const color = document.getElementById('editCompanyColor').value;
            const description = document.getElementById('editCompanyDescription').value.trim();
            
            // 表单验证
            if (!name) {
                showMessage('会社名を入力してください', 'error');
                return;
            }
            
            if (!code) {
                showMessage('会社コードを入力してください', 'error');
                return;
            }
            
            // 重复检查（排除当前编辑的公司）
            const isDuplicate = railwayCompanies.some(company => 
                company.id !== id && (company.name === name || company.code === code)
            );
            
            if (isDuplicate) {
                showMessage('同じ会社名またはコードが既に存在します', 'error');
                return;
            }
            
            const companyData = { name, code, color, description };
            if (updateRailwayCompany(id, companyData)) {
                showMessage('🎉 会社情報が更新されました！', 'success');
                renderCompanyList();
                closeEditModal();
            } else {
                showMessage('更新に失敗しました', 'error');
            }
        }

        /**
         * 切换线路表单显示
         */
        function toggleRouteForm(companyId) {
            const formContainer = document.getElementById(`routeForm_${companyId}`);
            if (formContainer) {
                formContainer.classList.toggle('expanded');
                
                // 如果展开了表单，隐藏线路列表
                if (formContainer.classList.contains('expanded')) {
                    const listContainer = document.getElementById(`routeList_${companyId}`);
                    if (listContainer) {
                        listContainer.classList.remove('expanded');
                    }
                }
            }
        }

        /**
         * 切换线路列表显示
         */
        function toggleRouteList(companyId) {
            const listContainer = document.getElementById(`routeList_${companyId}`);
            if (listContainer) {
                listContainer.classList.toggle('expanded');
                
                // 如果展开了列表，隐藏线路表单
                if (listContainer.classList.contains('expanded')) {
                    const formContainer = document.getElementById(`routeForm_${companyId}`);
                    if (formContainer) {
                        formContainer.classList.remove('expanded');
                    }
                }
            }
        }

        // ============================
        // 初期化
        // ============================
        
        function init() {
            console.log('システムを初期化しています...');
            
            // データをロードする
            loadCompaniesData();
            loadRoutesData();
            
            // 更新计数
            updateCompanyCount();
            
            // リストをレンダリングする
            renderCompanyList();
            
            // イベントをバインドする
            document.getElementById('companyForm').addEventListener('submit', handleCompanyFormSubmit);
            document.getElementById('searchInput').addEventListener('input', searchCompanies);
            document.getElementById('editForm').addEventListener('submit', handleEditSubmit);
            
            console.log('初期化が完了しました');
        }

        // ページが読み込まれたら初期化する
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
